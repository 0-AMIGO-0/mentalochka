<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Улучшить ментальное состояние</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* чтобы стрелка не выделялась */
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e2b3c, #0f1a24);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Montserrat', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        /* Центральный блок */
        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            border-radius: 64px;
            padding: 40px 30px 50px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Фраза */
        .phrase {
            font-size: 2rem;
            font-weight: 600;
            color: #f9f3d9;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            letter-spacing: -0.5px;
            margin-bottom: 30px;
            word-break: keep-all;
        }

        /* Контейнер для стрелки + кнопка, чтобы стрелка указывала именно на кнопку */
        .arrow-area {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        /* Анимированная стрелка вниз */
        .arrow-down {
            display: inline-block;
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 30px solid #ffb347;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            animation: bounce 1.2s infinite ease-in-out;
            margin-bottom: 8px;
        }

        /* Дополнительная стрелка (можно было просто одну, но сделаем двойную для эффекта) */
        .arrow-line {
            font-size: 2.2rem;
            line-height: 1;
            color: #ffb347;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            animation: bounce 1.2s infinite;
            font-weight: bold;
        }

        /* Анимация подпрыгивания */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(12px); }
        }

        /* Кнопка улучшения */
        .improve-btn {
            background: linear-gradient(95deg, #f09819, #ff5e00);
            border: none;
            padding: 18px 42px;
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.4);
            transition: 0.2s;
            font-family: inherit;
            width: 80%;
            max-width: 280px;
        }

        .improve-btn:hover {
            transform: scale(1.02);
            background: linear-gradient(95deg, #ffaa33, #ff6a1a);
            box-shadow: 0 12px 28px rgba(0,0,0,0.4);
        }

        .improve-btn:active {
            transform: scale(0.97);
        }

        /* подсказка про клавиатуру (необязательно, но приятно) */
        .hint {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #ccc;
            background: rgba(0,0,0,0.4);
            display: inline-block;
            padding: 6px 14px;
            border-radius: 50px;
        }

        /* Полноэкранный контейнер для видео */
        .fullscreen-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        .fullscreen-video iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Кнопка закрытия (появляется при наведении, но пользователь может нажать Esc) */
        .close-video-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            z-index: 10001;
            font-family: monospace;
            backdrop-filter: blur(4px);
            transition: 0.2s;
        }
        .close-video-btn:hover {
            background: red;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="phrase">✨ улучшить ментальное состояние ✨</div>

    <div class="arrow-area">
        <!-- стрелочка указывает вниз на кнопку -->
        <div class="arrow-down"></div>
        <div class="arrow-line">👇</div>
        <button class="improve-btn" id="improveBtn">улучшить</button>
    </div>

    <div class="hint">
        ⚡ нажми кнопку — откроется видео на весь экран<br>
        ✖ выход по <kbd>ESC</kbd> или кнопке внизу экрана
    </div>
</div>

<script>
    (function() {
        const improveButton = document.getElementById('improveBtn');
        let currentFullscreenElement = null;

        // Функция создания полноэкранного видео
        function openFullscreenVideo() {
            // если уже есть открытое видео – не создаём дубль
            if (document.querySelector('.fullscreen-video')) return;

            // Создаём контейнер
            const videoContainer = document.createElement('div');
            videoContainer.className = 'fullscreen-video';
            
            // Вставляем iframe с YouTube Shorts (embed-версия, автовоспроизведение)
            const iframe = document.createElement('iframe');
            // ID ролика: Aug1BRWNx8Q
            // Используем embed-ссылку с autoplay=1 (при клике на кнопку будет взаимодействие -> autoplay разрешён)
            iframe.src = 'https://www.youtube.com/embed/Aug1BRWNx8Q?autoplay=1&rel=0&modestbranding=1';
            iframe.allow = 'autoplay; fullscreen; encrypted-media';
            iframe.allowFullscreen = true;
            iframe.setAttribute('allowfullscreen', 'true');
            
            // Кнопка закрытия (альтернатива Esc)
            const closeBtn = document.createElement('button');
            closeBtn.textContent = '✖ Закрыть видео';
            closeBtn.className = 'close-video-btn';
            closeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                exitFullscreenAndRemove(videoContainer);
            });
            
            videoContainer.appendChild(iframe);
            videoContainer.appendChild(closeBtn);
            document.body.appendChild(videoContainer);
            
            // Пытаемся перевести контейнер в полноэкранный режим
            // Сначала запрашиваем fullscreen для самого контейнера, чтобы видео заняло весь экран монитора
            if (videoContainer.requestFullscreen) {
                videoContainer.requestFullscreen().catch(err => {
                    console.warn('Fullscreen request failed:', err);
                    // Если не удалось – оставляем контейнер на весь экран (он и так position fixed)
                    // но добавим инструкцию
                });
            } else if (videoContainer.webkitRequestFullscreen) {
                videoContainer.webkitRequestFullscreen();
            } else if (videoContainer.msRequestFullscreen) {
                videoContainer.msRequestFullscreen();
            }
            
            // Сохраняем ссылку на контейнер, чтобы потом удалить
            currentFullscreenElement = videoContainer;
            
            // Обработчик выхода из полноэкранного режима (нажатие Esc или системный выход)
            const fullscreenChangeHandler = () => {
                // Если полноэкранный режим был завершён (и нет активного fullscreen элемента)
                if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
                    // Удаляем контейнер, если он всё ещё существует
                    if (videoContainer && videoContainer.parentNode) {
                        videoContainer.remove();
                    }
                    // Убираем обработчик
                    document.removeEventListener('fullscreenchange', fullscreenChangeHandler);
                    document.removeEventListener('webkitfullscreenchange', fullscreenChangeHandler);
                    document.removeEventListener('msfullscreenchange', fullscreenChangeHandler);
                    currentFullscreenElement = null;
                }
            };
            
            document.addEventListener('fullscreenchange', fullscreenChangeHandler);
            document.addEventListener('webkitfullscreenchange', fullscreenChangeHandler);
            document.addEventListener('msfullscreenchange', fullscreenChangeHandler);
            
            // Дополнительная страховка: если пользователь закрыл через кнопку closeBtn, то удаляем и выходим из fullscreen
            function exitFullscreenAndRemove(container) {
                if (document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement) {
                    if (document.exitFullscreen) document.exitFullscreen();
                    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                    else if (document.msExitFullscreen) document.msExitFullscreen();
                }
                if (container && container.parentNode) container.remove();
                currentFullscreenElement = null;
                // чистим обработчики
                document.removeEventListener('fullscreenchange', fullscreenChangeHandler);
                document.removeEventListener('webkitfullscreenchange', fullscreenChangeHandler);
                document.removeEventListener('msfullscreenchange', fullscreenChangeHandler);
            }
            
            // Сохраняем возможность закрыть принудительно (если нажали Esc, но fullscreenchange сработает)
            // Если вдруг fullscreenchange не сработал (редко), пользователь закроет кнопкой.
        }
        
        // Назначить открытие на кнопку
        improveButton.addEventListener('click', openFullscreenVideo);
        
        // Бонус: открытие по клавише "Enter" или " " (пробел) для удобства
        document.addEventListener('keydown', (e) => {
            // Если открыто модальное окно с видео - не мешаем, но пусть обрабатывает Esc отдельно.
            // Если видео не открыто, нажатие Enter или пробел открывает видео
            if (document.querySelector('.fullscreen-video')) return;
            
            if (e.key === 'Enter' || e.key === ' ' || e.key === 'Space') {
                e.preventDefault();   // чтобы не прокручивало страницу при пробеле
                openFullscreenVideo();
            }
        });
        
        // Доп. защита: если видео открыто, а пользователь нажал Esc – fullscreenchange отработает и удалит.
        // Но на всякий случай добавим обработку Escape для ручного удаления (если fullscreen не сработал)
        document.addEventListener('keydown', (e) => {
            const videoDiv = document.querySelector('.fullscreen-video');
            if (videoDiv && e.key === 'Escape') {
                // Если fullscreen не активен или не сработал, удалим вручную
                if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
                    videoDiv.remove();
                }
            }
        });
    })();
</script>
</body>
</html>
